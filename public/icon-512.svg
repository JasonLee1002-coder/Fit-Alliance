<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative circle -->
  <circle cx="400" cy="120" r="120" fill="white" opacity="0.08"/>
  <circle cx="100" cy="420" r="80" fill="white" opacity="0.06"/>
  <!-- Scale icon (weight) -->
  <g transform="translate(256,220)" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Scale base -->
    <ellipse cx="0" cy="60" rx="100" ry="20" fill="white" opacity="0.15" stroke="none"/>
    <path d="M-80,50 L-80,-20 C-80,-60 -40,-90 0,-90 C40,-90 80,-60 80,-20 L80,50" stroke-width="14"/>
    <!-- Scale needle -->
    <line x1="0" y1="-70" x2="0" y2="-20" stroke-width="10"/>
    <circle cx="0" cy="-20" r="8" fill="white"/>
    <!-- Scale marks -->
    <line x1="-40" y1="-65" x2="-30" y2="-50" stroke-width="6"/>
    <line x1="40" y1="-65" x2="30" y2="-50" stroke-width="6"/>
  </g>
  <!-- Alliance people (3 figures) -->
  <g transform="translate(256,350)" fill="white">
    <!-- Center person (larger) -->
    <circle cx="0" cy="-10" r="14"/>
    <path d="M-20,15 Q0,0 20,15 L18,40 L-18,40 Z" opacity="0.9"/>
    <!-- Left person -->
    <circle cx="-55" cy="-5" r="11" opacity="0.7"/>
    <path d="M-70,18 Q-55,8 -40,18 L-42,38 L-68,38 Z" opacity="0.6"/>
    <!-- Right person -->
    <circle cx="55" cy="-5" r="11" opacity="0.7"/>
    <path d="M40,18 Q55,8 70,18 L68,38 L42,38 Z" opacity="0.6"/>
  </g>
  <!-- Text: FA -->
  <text x="256" y="460" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="42" font-weight="900" letter-spacing="8" opacity="0.9">FIT ALLIANCE</text>
</svg>
